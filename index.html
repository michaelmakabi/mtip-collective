// ============================================================
// JV WIZARD
// ============================================================

window.__GHL_PIT = 'pit-b1c8e50d-9629-415e-8209-f71956488e5b';
window.__wizardLoadedAt = Date.now();
(function() {
  const wState = {
    step: 1,
    propertyType: '',
    city: '',
    state: '',
    sqft: '',
    ceiling: '',
    podCount: 6,
    dealStructure: 'zero-capex',
    firstName: '',
    lastName: '',
    email: '',
    phone: '',
    company: ''
  };
  const POD_RENT = 900; // $900/mo avg per Quad/Suite
  const RETAIL_PER_POD = 7500; // ~weighted avg of Quad ($5,497) + Suite ($6,997) heavy mix
  const TOTAL_STEPS = 5;

  const $progress = document.querySelectorAll('.wizard-progress-step');
  const $steps = document.querySelectorAll('.wizard-step');
  const $report = document.querySelector('.wizard-report');
  const $back = document.getElementById('wizardBack');
  const $next = document.getElementById('wizardNext');
  const $submit = document.getElementById('wizardSubmit');

  function showStep(n) {
    wState.step = n;
    $steps.forEach(s => s.classList.toggle('active', parseInt(s.dataset.step) === n));
    if ($report) $report.classList.toggle('active', n === 6);
    $progress.forEach((p, i) => {
      p.classList.toggle('done', i < n - 1);
      p.classList.toggle('active', i === n - 1);
    });
    $back.disabled = (n === 1);
    if (n === TOTAL_STEPS) {
      $next.style.display = 'none';
      $submit.style.display = 'inline-flex';
    } else if (n > TOTAL_STEPS) {
      $next.style.display = 'none';
      $submit.style.display = 'none';
    } else {
      $next.style.display = 'inline-flex';
      $submit.style.display = 'none';
    }
  }

  // Option buttons
  document.querySelectorAll('.wizard-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const field = btn.dataset.field;
      const value = btn.dataset.value;
      // Clear other options in this field group
      document.querySelectorAll('.wizard-option[data-field="' + field + '"]').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      wState[field] = value;
    });
  });

  // Text inputs
  document.querySelectorAll('.wizard-input, .wizard-select').forEach(inp => {
    inp.addEventListener('input', e => {
      const field = e.target.dataset.field;
      if (field) wState[field] = e.target.value;
    });
  });

  // Slider
  const $slider = document.getElementById('podCountSlider');
  const $countDisplay = document.getElementById('podCountDisplay');
  const $revenuePreview = document.getElementById('podRevenuePreview');
  if ($slider) {
    $slider.addEventListener('input', () => {
      const v = parseInt($slider.value);
      wState.podCount = v;
      $countDisplay.textContent = v;
      $revenuePreview.textContent = '$' + (v * POD_RENT).toLocaleString();
    });
  }

  // Validate
  function validateStep(n) {
    if (n === 1) return !!wState.propertyType;
    if (n === 2) return !!(wState.city && wState.state && wState.sqft && wState.ceiling);
    if (n === 3) return wState.podCount >= 2;
    if (n === 4) return !!wState.dealStructure;
    if (n === 5) return !!(wState.firstName && wState.email);
    return true;
  }

  // Nav
  $next.addEventListener('click', () => {
    if (!validateStep(wState.step)) {
      // Subtle shake
      const s = document.querySelector('.wizard-step.active');
      s.style.animation = 'none';
      setTimeout(() => { s.style.animation = 'wizardFade 0.3s ease'; }, 10);
      return;
    }
    if (wState.step < TOTAL_STEPS) showStep(wState.step + 1);
  });
  $back.addEventListener('click', () => {
    if (wState.step > 1) showStep(wState.step - 1);
  });

  // Submit + report
  function generateReport() {
    const annualRevenue = wState.podCount * POD_RENT * 12;
    const totalRetail = wState.podCount * RETAIL_PER_POD;
    const monthlyRevenue = wState.podCount * POD_RENT;
    let reportData = { annualRevenue, totalRetail, monthlyRevenue };

    // Calculate based on deal structure
    let dealLabel, dealHeadline, dealBody, recoupValue, recoupLabel, recoupHint, fiveYearNet;
    const fiveYearRevenue = annualRevenue * 5;

    if (wState.dealStructure === 'buy') {
      recoupValue = (totalRetail / monthlyRevenue).toFixed(1) + ' mo';
      recoupLabel = 'Capex payback';
      recoupHint = 'You front the cost';
      fiveYearNet = fiveYearRevenue - totalRetail;
      dealLabel = 'Recommended deal: Buy outright (Option A)';
      dealHeadline = 'Pay $' + totalRetail.toLocaleString() + ' upfront. Keep 100% of revenue. Full asset on your books.';
      dealBody = 'You front the equipment cost (' + wState.podCount + ' pods × $' + RETAIL_PER_POD.toLocaleString() + ' avg = $' + totalRetail.toLocaleString() + '). Annual revenue: $' + annualRevenue.toLocaleString() + '. Capex pays back in ' + recoupValue + '. After that, $' + annualRevenue.toLocaleString() + '/yr is fully yours, plus the asset depreciates as commercial furniture (7-year MACRS).';
    } else if (wState.dealStructure === '50-50') {
      const yourCapex = totalRetail / 2;
      recoupValue = '50/50 perpetual';
      recoupLabel = 'Revenue split';
      recoupHint = 'No recoupment phase';
      fiveYearNet = fiveYearRevenue / 2 - yourCapex;
      dealLabel = 'Recommended deal: 50/50 JV (Option B)';
      dealHeadline = 'You and MTIP each fund $' + yourCapex.toLocaleString() + '. We split rental revenue 50/50, perpetually.';
      dealBody = 'Equipment cost split: $' + yourCapex.toLocaleString() + ' from you, $' + yourCapex.toLocaleString() + ' from MTIP. Annual revenue: $' + annualRevenue.toLocaleString() + '. Each side gets $' + (annualRevenue/2).toLocaleString() + '/yr. Either party can manage.';
    } else if (wState.dealStructure === 'percentage-lease') {
      recoupValue = '% of gross';
      recoupLabel = 'Lease basis';
      recoupHint = 'No capex from you';
      fiveYearNet = fiveYearRevenue * 0.20; // ~20% of gross to landlord
      dealLabel = 'Recommended deal: Percentage lease';
      dealHeadline = 'MTIP leases the space from you and pays a % of gross pod revenue as rent.';
      dealBody = 'We bring the equipment, manage operations, pay you ~20% of gross rental revenue as percentage rent on a multi-year lease. Zero capex, zero operations from you. Predictable cash flow on space that may otherwise sit empty. Specific % varies with location and footprint — covered in the term sheet.';
    } else {
      // zero-capex (default) or not-sure
      recoupValue = (totalRetail / monthlyRevenue).toFixed(1) + ' mo';
      recoupLabel = 'Capital recovers in';
      recoupHint = 'First-money-out · MTIP funds 100%';
      const postRecoup5yr = (fiveYearRevenue - totalRetail) * 0.75;
      fiveYearNet = postRecoup5yr;
      dealLabel = wState.dealStructure === 'not-sure' ? 'Top fit: Zero-Capex JV (Option C)' : 'Recommended deal: Zero-Capex JV (Option C)';
      dealHeadline = '$0 capex from you. We fund 100%, recover from rental income, then 75/25 perpetual override.';
      dealBody = 'Your ' + wState.podCount + ' pods generate $' + annualRevenue.toLocaleString() + '/yr. We fund the equipment cost ($' + totalRetail.toLocaleString() + ' retail). After ~' + recoupValue + ' of revenue, capital is recouped. From that point onward: $' + Math.round(annualRevenue*0.75).toLocaleString() + '/yr to you, $' + Math.round(annualRevenue*0.25).toLocaleString() + '/yr to MTIP, in perpetuity. Pure upside, zero downside, on real estate you already own.';
    }

    document.getElementById('reportFirstName').textContent = wState.firstName ? 'for ' + wState.firstName : 'on your property';
    document.getElementById('reportSummary').textContent = 'Based on ' + wState.podCount + ' Quads/Suites at $' + POD_RENT + '/mo average rental, located in ' + (wState.city || 'your market') + (wState.state ? ', ' + wState.state.toUpperCase() : '') + '.';
    document.getElementById('reportAnnualRevenue').textContent = '$' + annualRevenue.toLocaleString();
    document.getElementById('reportPodLine').textContent = wState.podCount + ' pods × $' + POD_RENT + '/mo';
    document.getElementById('reportRecoup').textContent = recoupValue;
    document.getElementById('reportRecoupLabel').textContent = recoupLabel;
    document.getElementById('reportRecoupHint').textContent = recoupHint;
    document.getElementById('report5yr').textContent = '$' + Math.round(Math.max(0, fiveYearNet)).toLocaleString();
    document.getElementById('report5yrHint').textContent = wState.dealStructure === 'percentage-lease' ? '20% of gross over 5 years' : (wState.dealStructure === '50-50' ? 'Net of capex contribution' : 'After capex/recoupment');
    document.getElementById('reportDealLabel').textContent = dealLabel;
    document.getElementById('reportDealHeadline').textContent = dealHeadline;
    document.getElementById('reportDealBody').textContent = dealBody;

    return reportData;
  }

  // Submit handler — multi-channel capture
  $submit.addEventListener('click', () => {
    if (!validateStep(5)) return;
    generateReport();
    showStep(6);
    // Send the data
    submitWizardData();
    // Refresh icons
    if (window.lucide) window.lucide.createIcons();
  });

  function submitWizardData() {
    // Anti-spam: honeypot + dwell time
    const hpEl = document.getElementById('wizard-hp');
    if (hpEl && hpEl.value) {
      console.warn('Honeypot triggered — submission blocked');
      return;
    }
    if (!window.__wizardLoadedAt) window.__wizardLoadedAt = Date.now() - 3500;
    if (Date.now() - window.__wizardLoadedAt < 2500) {
      console.warn('Too-fast submission — likely bot');
      return;
    }

    const annualRevenue = wState.podCount * POD_RENT * 12;
    const totalRetail = wState.podCount * 7500;
    const monthlyRevenue = wState.podCount * POD_RENT;
    let recoupMonths = '', fiveYrNet = 0;
    if (wState.dealStructure === 'buy') {
      recoupMonths = (totalRetail/monthlyRevenue).toFixed(1) + ' mo';
      fiveYrNet = annualRevenue*5 - totalRetail;
    } else if (wState.dealStructure === '50-50') {
      recoupMonths = '50/50 perpetual';
      fiveYrNet = annualRevenue*5/2 - totalRetail/2;
    } else if (wState.dealStructure === 'percentage-lease') {
      recoupMonths = '% of gross';
      fiveYrNet = annualRevenue*5*0.20;
    } else {
      recoupMonths = (totalRetail/monthlyRevenue).toFixed(1) + ' mo';
      fiveYrNet = (annualRevenue*5 - totalRetail) * 0.75;
    }

    // GHL Contact Creation API — direct, no proxy
    // Custom field IDs from the MTIP Collective sub-account (created via API)
    const ghlPayload = {
      locationId: '0NHYHZyUXGnIKzXtwqJB',
      firstName: wState.firstName,
      lastName: wState.lastName,
      email: wState.email,
      phone: wState.phone || '',
      companyName: wState.company || '',
      city: wState.city,
      state: (wState.state || '').toUpperCase(),
      country: 'US',
      source: 'pods.mtip.ai/JV-wizard',
      tags: ['pod-jv-lead'],
      customFields: [
        {id: 'P52lBLzsOsPgNBnuH3xE', value: wState.propertyType},
        {id: 'oEFx8MxTseCu04Jr6gCb', value: wState.city},
        {id: 'bnnHe4bcuhoLElnwoBNH', value: (wState.state||'').toUpperCase()},
        {id: '89W6yJEvZu2tRWq2G11s', value: wState.sqft},
        {id: 'e8V3Ja33H940fz3vDx0h', value: wState.ceiling},
        {id: 'nGyZGaSn050UIpebpYO7', value: wState.podCount},
        {id: 'Q0M4FQQJDGrEoybkB64R', value: wState.dealStructure},
        {id: 'o86twLp4ZE8u8iH7eFQP', value: annualRevenue},
        {id: 'n3qwb02WUUC1LT6kxf5d', value: recoupMonths},
        {id: 'QH4n1OVh6cgLRUhKfRZr', value: Math.max(0, Math.round(fiveYrNet))},
        {id: 'gkbUsjyzpPfic5Fqnkri', value: totalRetail},
        {id: 'WhF02cerhstv8jADPdR0', value: new Date().toISOString()},
        {id: 'A0D47fqcCV5HjtTHSih1', value: 'pods.mtip.ai JV Wizard'}
      ]
    };

    fetch('https://services.leadconnectorhq.com/contacts/', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + window.__GHL_PIT,
        'Version': '2021-07-28',
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(ghlPayload)
    }).then(r => r.json()).then(data => {
      const contactId = data && data.contact && data.contact.id;
      if (contactId) {
        // Add a note with the calculation summary
        const noteBody = ['MTIP Pods JV Wizard Submission',
          '─────────────────',
          'Property type: ' + wState.propertyType,
          'Location: ' + wState.city + ', ' + (wState.state||'').toUpperCase(),
          'Sqft available: ' + wState.sqft,
          'Ceiling: ' + wState.ceiling,
          'Pod count: ' + wState.podCount,
          'Deal structure preference: ' + wState.dealStructure,
          '',
          'Projected annual rental revenue: $' + annualRevenue.toLocaleString(),
          'Equipment retail: $' + totalRetail.toLocaleString(),
          'Recoupment: ' + recoupMonths,
          '5-year landlord net (computed): $' + Math.max(0,Math.round(fiveYrNet)).toLocaleString(),
          '',
          'Submitted: ' + new Date().toLocaleString(),
          'Company: ' + (wState.company || '—'),
          'Phone: ' + (wState.phone || '—')
        ].join('\n');
        fetch('https://services.leadconnectorhq.com/contacts/' + contactId + '/notes', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + window.__GHL_PIT,
            'Version': '2021-07-28',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ body: noteBody, userId: '0bYKT0YpEIRrizq06pMN' })
        }).catch(e => console.warn('Note add failed:', e));
      }
    }).catch(e => console.warn('GHL submit failed:', e));

    // Show success
    setTimeout(() => {
      const successEl = document.getElementById('wizardSuccess');
      if (successEl) successEl.classList.add('shown');
    }, 600);
  }

  // Init
  showStep(1);
})();


// CAROUSEL
const cTrack = document.getElementById('carouselTrack');
const cPrev = document.getElementById('carouselPrev');
const cNext = document.getElementById('carouselNext');
const cCounter = document.getElementById('carouselCounter');
const cSlides = cTrack ? cTrack.querySelectorAll('.carousel-slide') : [];
let cIdx = 0;
function cUpdate(){if(!cCounter)return;cCounter.textContent=(cIdx+1)+' / '+cSlides.length;}
function cGo(i){if(!cSlides.length)return;cIdx=Math.max(0,Math.min(cSlides.length-1,i));cSlides[cIdx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});cUpdate();}
cPrev&&cPrev.addEventListener('click',()=>cGo(cIdx-1));
cNext&&cNext.addEventListener('click',()=>cGo(cIdx+1));
if(cTrack){let cTimer;cTrack.addEventListener('scroll',()=>{clearTimeout(cTimer);cTimer=setTimeout(()=>{const center=cTrack.scrollLeft+cTrack.clientWidth/2;let best=0,bestD=Infinity;cSlides.forEach((s,i)=>{const d=Math.abs(s.offsetLeft+s.clientWidth/2-center);if(d<bestD){bestD=d;best=i;}});cIdx=best;cUpdate();},120);});}
cUpdate();
const cPrevHover = document.getElementById('carouselPrevHover');
const cNextHover = document.getElementById('carouselNextHover');
cPrevHover && cPrevHover.addEventListener('click', () => cGo(cIdx-1));
cNextHover && cNextHover.addEventListener('click', () => cGo(cIdx+1));

// NOISE DEMO — REAL audio playback with crossfade
const nDb=document.getElementById('noiseDb');
const nFill=document.getElementById('noiseFill');
const nStatus=document.getElementById('noiseStatus');
const nLabel=document.getElementById('noiseStateLabel');
const nDesc=document.getElementById('noiseStateDesc');
const nBtnO=document.getElementById('noiseBtnOutside');
const nBtnI=document.getElementById('noiseBtnInside');
const nBtnS=document.getElementById('noiseBtnStop');

// Two looping audio elements, crossfade between them on toggle
const nAudioOutside = new Audio('assets/audio/office-outside.mp3');
const nAudioInside = new Audio('assets/audio/office-inside.mp3');
nAudioOutside.loop = true;
nAudioInside.loop = true;
nAudioOutside.preload = 'auto';
nAudioInside.preload = 'auto';
let nState = 'off';

function nCrossfade(targetAudio, otherAudio, targetVol, durMs){
  const start = performance.now();
  const fromVol = otherAudio.volume;
  const toVol = targetVol;
  // Make sure target is playing
  if (targetAudio.paused) {
    targetAudio.volume = 0;
    const p = targetAudio.play();
    if (p && p.catch) p.catch(()=>{});
  }
  function step(t){
    const k = Math.min(1, (t - start)/durMs);
    targetAudio.volume = k * toVol;
    otherAudio.volume = (1 - k) * fromVol;
    if (k < 1) requestAnimationFrame(step);
    else {
      otherAudio.pause();
      otherAudio.currentTime = 0;
    }
  }
  requestAnimationFrame(step);
}

function nMeter(db, msg, mode){
  const start = parseInt(nDb.textContent) || db;
  let frame=0;
  const total=20;
  const stepDb=(db-start)/total;
  const ival = setInterval(()=>{
    frame++;
    const cur = Math.round(start + stepDb*frame);
    nDb.textContent = cur;
    nFill.style.width = Math.max(5, Math.min(100, (cur-20)*1.5)) + '%';
    if (frame >= total) clearInterval(ival);
  }, 25);
  if (nStatus) nStatus.textContent = msg;
  if (nDb) nDb.classList.toggle('quiet', mode==='inside');
  if (nStatus) nStatus.classList.toggle('quiet', mode==='inside');
}

function nGoOutside(){
  nState = 'outside';
  nCrossfade(nAudioOutside, nAudioInside, 0.85, 700);
  nMeter(68, 'Open office — too loud to focus.', 'outside');
  if (nBtnO) nBtnO.classList.add('active');
  if (nBtnI) nBtnI.classList.remove('active');
  if (nLabel) nLabel.textContent = 'Open office — outside the pod';
  if (nDesc) nDesc.textContent = 'Phone calls. Keyboard typing. Conversations.';
}
function nGoInside(){
  nState = 'inside';
  nCrossfade(nAudioInside, nAudioOutside, 0.6, 900);
  nMeter(38, 'Inside the pod — conversation-private.', 'inside');
  if (nBtnI) nBtnI.classList.add('active');
  if (nBtnO) nBtnO.classList.remove('active');
  if (nLabel) nLabel.textContent = 'Inside the MTIP Pod';
  if (nDesc) nDesc.textContent = '30 dB acoustic walls. Filtered. Quiet. Yours.';
}
function nStop(){
  nAudioOutside.pause(); nAudioOutside.currentTime = 0;
  nAudioInside.pause(); nAudioInside.currentTime = 0;
  nState = 'off';
  if (nBtnO) nBtnO.classList.remove('active');
  if (nBtnI) nBtnI.classList.remove('active');
  nMeter(0, 'Demo paused.', 'outside');
}

if (nBtnO) nBtnO.addEventListener('click', nGoOutside);
if (nBtnI) nBtnI.addEventListener('click', () => {
  if (nState === 'off') {
    // Start outside first, then auto-transition inside after a beat
    nGoOutside();
    setTimeout(nGoInside, 1200);
  } else {
    nGoInside();
  }
});
if (nBtnS) nBtnS.addEventListener('click', nStop);
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-0.011em}
img,video{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{font-family:'Inter',sans-serif;font-weight:800;line-height:1.02;letter-spacing:-0.035em;color:var(--text)}
h1{font-size:clamp(3rem,7.5vw,6.5rem);font-weight:900}
h2{font-size:clamp(2.25rem,4.5vw,4rem);font-weight:800}
h3{font-size:clamp(1.75rem,3vw,2.75rem);font-weight:700}
h4{font-size:clamp(1.125rem,1.6vw,1.5rem);font-weight:600;letter-spacing:-0.02em}
.text-red{color:var(--red)}
p{color:var(--text-mid)}
.lead{font-size:clamp(1.125rem,1.5vw,1.35rem);color:var(--text-mid);max-width:720px;line-height:1.55}
.container{max-width:1380px;margin:0 auto;padding:0 32px}
.container-tight{max-width:1040px;margin:0 auto;padding:0 32px}
@media(max-width:640px){.container,.container-tight{padding:0 20px}}
.section{padding:140px 0}
@media(max-width:768px){.section{padding:80px 0}}
.section-dark{background:var(--black);color:white}
.section-dark h1,.section-dark h2,.section-dark h3,.section-dark h4{color:white}
.section-dark p{color:rgba(255,255,255,0.7)}
.section-soft{background:var(--bg-soft)}
.eyebrow{font-size:0.78rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--red);margin-bottom:20px;display:inline-block}
.section-dark .eyebrow{color:var(--red-light)}
.section-header{max-width:880px;margin:0 auto 64px}
.section-header.center{text-align:center}
.section-header h2+p{margin-top:24px}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,0.06)}
.nav-inner{max-width:1380px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 32px}
.nav-logo img{height:48px;width:auto}@media(max-width:640px){.nav-logo img{height:38px}}
.nav-tabs{display:flex;gap:36px}
.nav-tabs a{font-size:0.95rem;font-weight:500;color:var(--text-mid);transition:color 0.2s}
.nav-tabs a:hover,.nav-tabs a.current{color:var(--red)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;font-family:inherit;font-size:1rem;font-weight:600;letter-spacing:-0.01em;border-radius:999px;border:1.5px solid transparent;transition:all 0.2s ease;cursor:pointer;white-space:nowrap}
.btn-red{background:var(--grad-cta);color:white;box-shadow:var(--shadow-red)}

tierToggleBtns.forEach(btn=>{btn.addEventListener('click',()=>{tierToggleBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');const m=btn.dataset.mode;document.querySelectorAll('.tier-price-amount').forEach(el=>{el.textContent=el.dataset[m];});document.querySelectorAll('.tier-price-suffix').forEach(el=>{el.textContent=el.dataset[m];});});});
const roiInput=document.getElementById('roiInput');
const roiAnnual=document.getElementById('roiAnnual');
const roiPayback=document.getElementById('roiPayback');
const roiSavings=document.getElementById('roiSavings');
const SUITE_PRICE=6997;
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function calcROI(){
  const m=Math.max(0,parseFloat(roiInput.value)||0);
  const annual=m*12;
  // Zero-Capex JV math: 100% of revenue to MTIP until $6,997 recovered, then 75% to landlord
  const recoupMonths = m>0 ? SUITE_PRICE/m : 0;
  const fiveYrRevenue = annual*5;
  const landlordNet = m>0 ? Math.max(0, (fiveYrRevenue - SUITE_PRICE) * 0.75) : 0;
  roiAnnual.textContent=fmt(annual);
  roiPayback.textContent=m>0?recoupMonths.toFixed(1)+' mo':'—';
  roiSavings.textContent=fmt(landlordNet);
}
roiInput&&roiInput.addEventListener('input',calcROI);

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// 3D POD ROTATION VIEWER — simplified geometry placeholder
(function(){
  const container = document.getElementById('pod3d-container');
  if (!container || !window.THREE) return;
  // Pod dimensions in arbitrary units (footprint scaling)
  const podDims = {
    studio: {w: 0.96, d: 1.0, h: 2.2, label: 'Studio'},
    duo:    {w: 1.5, d: 1.4, h: 2.2, label: 'Duo'},
    quad:   {w: 2.1, d: 1.4, h: 2.2, label: 'Quad'},
    suite:  {w: 2.1, d: 2.1, h: 2.25, label: 'Suite'}
  };

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0A0B0D);

  const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100);
  camera.position.set(5, 3, 5);
  camera.lookAt(0, 0.8, 0);

  const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  // Remove loading message + add canvas
  const loadingEl = container.querySelector('.pod-3d-loading');
  if (loadingEl) loadingEl.remove();
  container.appendChild(renderer.domElement);

  // Lighting — soft 3-point setup
  const keyLight = new THREE.DirectionalLight(0xFFFFFF, 1.0);
  keyLight.position.set(5, 8, 5);
  scene.add(keyLight);
  const fillLight = new THREE.DirectionalLight(0xE53B3B, 0.18);
  fillLight.position.set(-5, 3, -3);
  scene.add(fillLight);
  scene.add(new THREE.AmbientLight(0xFFFFFF, 0.35));

  // Floor (subtle ground plane)
  const floorMat = new THREE.MeshStandardMaterial({color: 0x16181C, roughness: 0.9});
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), floorMat);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);
  // Subtle grid
  const grid = new THREE.GridHelper(10, 10, 0x2A2722, 0x1F1F22);
  grid.position.y = 0.001;
  scene.add(grid);

  // Pod group (we'll rebuild this on tier change)
  let podGroup = new THREE.Group();
  scene.add(podGroup);

  function buildPod(tier) {
    while (podGroup.children.length) podGroup.remove(podGroup.children[0]);
    const d = podDims[tier];
    const w = d.w, dp = d.d, ht = d.h;

    // White outer shell (slightly transparent)
    const shellMat = new THREE.MeshStandardMaterial({color: 0xF5F5F7, roughness: 0.7, metalness: 0.05});
    const shell = new THREE.Mesh(new THREE.BoxGeometry(w, ht, dp), shellMat);
    shell.position.y = ht / 2;
    podGroup.add(shell);

    // Glass front (smaller box at front face)
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0x16181C,
      roughness: 0.05,
      metalness: 0.3,
      transmission: 0.7,
      thickness: 0.1,
      transparent: true,
      opacity: 0.65
    });
    const glassW = w * 0.85, glassH = ht * 0.85;
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(glassW, glassH), glassMat);
    glass.position.set(0, ht / 2, dp / 2 + 0.001);
    podGroup.add(glass);

    // Black aluminum frame (edges)
    const frameMat = new THREE.MeshStandardMaterial({color: 0x1A1D24, roughness: 0.4, metalness: 0.5});
    const frameThick = 0.04;
    // Vertical edges (4)
    [[-w/2, dp/2], [w/2, dp/2], [-w/2, -dp/2], [w/2, -dp/2]].forEach(([x, z]) => {
      const edge = new THREE.Mesh(new THREE.BoxGeometry(frameThick, ht, frameThick), frameMat);
      edge.position.set(x, ht / 2, z);
      podGroup.add(edge);
    });
    // Top edges
    [[0, ht, dp/2, w], [0, ht, -dp/2, w], [-w/2, ht, 0, dp], [w/2, ht, 0, dp]].forEach(([x, y, z, len], i) => {
      const isWidth = i < 2;
      const geo = new THREE.BoxGeometry(isWidth ? len : frameThick, frameThick, isWidth ? frameThick : len);
      const edge = new THREE.Mesh(geo, frameMat);
      edge.position.set(x, y, z);
      podGroup.add(edge);
    });
    // Bottom edges
    [[0, 0, dp/2, w], [0, 0, -dp/2, w], [-w/2, 0, 0, dp], [w/2, 0, 0, dp]].forEach(([x, y, z, len], i) => {
      const isWidth = i < 2;
      const geo = new THREE.BoxGeometry(isWidth ? len : frameThick, frameThick, isWidth ? frameThick : len);
      const edge = new THREE.Mesh(geo, frameMat);
      edge.position.set(x, y, z);
      podGroup.add(edge);
    });

    // Door handle (subtle)
    const handleMat = new THREE.MeshStandardMaterial({color: 0x6B5232, roughness: 0.4, metalness: 0.3});
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.4, 0.04), handleMat);
    handle.position.set(w * 0.35, ht * 0.5, dp / 2 + 0.04);
    podGroup.add(handle);

    // Center camera so pod fits
    const dist = Math.max(w, dp) * 2.4 + 1.5;
    camera.position.set(dist, ht * 1.2, dist);
    camera.lookAt(0, ht / 2.5, 0);
  }

  buildPod('suite');

  // Mouse rotation
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let rotY = Math.PI / 5, rotX = 0.18;
  const targetRot = {y: rotY, x: rotX};

  renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  window.addEventListener('mouseup', () => { isDragging = false; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    targetRot.y += (e.clientX - prevX) * 0.01;
    targetRot.x += (e.clientY - prevY) * 0.005;
    targetRot.x = Math.max(-0.3, Math.min(0.6, targetRot.x));
    prevX = e.clientX; prevY = e.clientY;
  });
  // Touch
  renderer.domElement.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; });
  window.addEventListener('touchend', () => { isDragging = false; });
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    targetRot.y += (e.touches[0].clientX - prevX) * 0.01;
    targetRot.x += (e.touches[0].clientY - prevY) * 0.005;
    targetRot.x = Math.max(-0.3, Math.min(0.6, targetRot.x));
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  }, {passive: true});
  // Zoom
  renderer.domElement.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.1 : 0.9;
    camera.position.multiplyScalar(factor);
    const len = camera.position.length();
    if (len < 3) camera.position.setLength(3);
    if (len > 15) camera.position.setLength(15);
  }, {passive: false});

  // Auto-rotate when not interacting
  let lastInteraction = Date.now();
  ['mousedown','touchstart','wheel'].forEach(ev => renderer.domElement.addEventListener(ev, () => { lastInteraction = Date.now(); }));

  function animate() {
    requestAnimationFrame(animate);
    rotY += (targetRot.y - rotY) * 0.08;
    rotX += (targetRot.x - rotX) * 0.08;
    if (!isDragging && Date.now() - lastInteraction > 4000) {
      targetRot.y += 0.003;
    }
    podGroup.rotation.y = rotY;
    podGroup.rotation.x = rotX;
    renderer.render(scene, camera);
  }
  animate();

  // Resize
  window.addEventListener('resize', () => {
    if (!container.clientWidth) return;
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

  // Tier toggle
  document.querySelectorAll('.rot3d-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rot3d-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildPod(btn.dataset.pod);
    });
  });
})();
</script>

</body>
</html>
