name: Generate AI pod renders

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'Only generate renders matching this substring (empty = all)'
        required: false
        default: ''
      force:
        description: 'Regenerate even if image already exists'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: generate-renders
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pillow

      - name: Generate renders
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FILTER: ${{ inputs.filter }}
          FORCE: ${{ inputs.force }}
        run: python scripts/generate_renders.py
      continue-on-error: true

      - name: Commit + push new images
        if: always()
        run: |
          if [ -n "$(git status --porcelain assets/images/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/images/ai-*.jpg assets/images/lifestyle-*.jpg 2>/dev/null || true
            git commit -m "Auto-generate AI pod renders [skip ci]"
            git push origin main
          else
            echo "No image changes to commit."
          fi
